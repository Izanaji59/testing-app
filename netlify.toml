[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback : sert index.html pour toutes les routes non-statiques
# Netlify sert d'abord le fichier exact s'il existe (ex: /login/ → out/login/index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
